# =============================================================================
# docker-compose.yml  v1.0.2
# CUPS print server with Canon LBP7110Cw UFRII LT driver.
# Based on ManuelKlaer/docker-cups-canon.
#
# Usage:
#   1.  ./download-driver.sh        (once – downloads Canon driver tarball)
#   2.  cp .env-example .env && nano .env   (set PRINTER_IP and ADMIN_PASSWORD)
#   3.  docker compose up -d --build
#
# Optional example client (installs cups-client and sends a test page):
#   docker compose --profile example up
# =============================================================================

services:

  # ── CUPS Print Server ──────────────────────────────────────────────────────
  cups:
    build:
      context: .
      dockerfile: Dockerfile
    image: cups-canon-lbp7110cw:latest
    container_name: cups-canon-lbp7110cw
    restart: unless-stopped

    # All secrets and settings come from .env — nothing sensitive is hardcoded
    # here. Copy .env-example to .env and fill in your values. (#1)
    env_file:
      - .env

    # These non-sensitive defaults are fine in compose; sensitive values
    # (ADMIN_PASSWORD, PRINTER_IP) must come from .env.
    environment:
      CUPS_LOGLEVEL: "warn"      # error | warn | info | debug
      CUPS_ENV_DEBUG: "no"       # "yes" enables full bash -x trace
      PRINTER_NAME: "Canon_LBP7110Cw"
      PRINTER_PPD: "CNRCUPSLBP7110CZNK.ppd"

    ports:
      - "631:631"           # CUPS IPP + Web UI

    volumes:
      # /etc/cups  – persists printer queues between restarts (ManuelKlaer mount)
      - cups-config:/etc/cups
      # Extra persistent volumes for spool and logs
      - cups-spool:/var/spool/cups
      - cups-logs:/var/log/cups

    networks:
      - print-network

    # ── Healthcheck (#15) – single canonical definition ──────────────────────
    # The Dockerfile HEALTHCHECK is a fallback for docker run without compose.
    # This definition takes precedence when using compose and is the source
    # of truth for container orchestration.
    healthcheck:
      test: ["CMD", "curl", "-sf", "--max-time", "8", "http://localhost:631/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

    # ── Resource limits (#7) ──────────────────────────────────────────────────
    # Prevents a flood of print jobs from exhausting host RAM or disk.
    # Adjust the memory values to match your workload.
    deploy:
      resources:
        limits:
          memory: 512m
        reservations:
          memory: 128m

    # ── Log limits (#7) ───────────────────────────────────────────────────────
    # Caps the container stdout/stderr JSON log size on the host filesystem.
    # CUPS log files inside the cups-logs volume are controlled separately by
    # MaxLogSize in cupsd.conf (configured in the Dockerfile).
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"


# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  cups-config:
    driver: local
  cups-spool:
    driver: local
  cups-logs:
    driver: local

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  # Other containers can join this network to print:
  #   networks:
  #     - cups-canon_print-network
  # with:
  #   networks:
  #     cups-canon_print-network:
  #       external: true
  print-network:
    driver: bridge
